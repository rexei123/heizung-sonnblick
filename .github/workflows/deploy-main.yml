name: Deploy Main

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Environment "main" hat required reviewer — keine Produktion ohne Freigabe.
    environment: main
    steps:
      - uses: actions/checkout@v4

      - name: SSH Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.MAIN_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /opt/heizung-sonnblick
            git fetch origin
            git checkout main
            git reset --hard origin/main
            ./infra/deploy/deploy.sh main
