name: Backend CI

on:
  push:
    branches: [main, develop]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"

defaults:
  run:
    working-directory: backend

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_USER: heizung
          POSTGRES_PASSWORD: heizung_test
          POSTGRES_DB: heizung_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U heizung"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff (Lint)
        run: ruff check src tests

      - name: Ruff (Format-Check)
        run: ruff format --check --diff src tests

      - name: Mypy (Type-Check)
        run: mypy src

      - name: Pytest
        env:
          ENVIRONMENT: test
          DATABASE_URL: postgresql+asyncpg://heizung:heizung_test@localhost:5432/heizung_test
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test-secret-key-for-ci-only-32chars
        run: pytest --cov=heizung --cov-report=term-missing
