# ChirpStack v4 — Hauptkonfiguration (lokale Entwicklung)
# Quelle: https://www.chirpstack.io/docs/chirpstack/configuration.html

[logging]
  level = "info"
  json = false

[postgresql]
  # ChirpStack v4 macht KEINE ${VAR}-Substitution in TOML.
  # Stattdessen: env-var CHIRPSTACK__POSTGRESQL__DSN setzt diesen Wert ueber.
  # Hier nur Default fuer lokale Dev (anonymous Postgres auf chirpstack-postgres).
  dsn = "postgres://chirpstack:chirpstack@chirpstack-postgres:5432/chirpstack?sslmode=disable"
  max_open_connections = 10
  min_idle_connections = 0

[redis]
  servers = ["redis://redis:6379/1"]
  cluster = false
  key_prefix = "cs:"

[network]
  net_id = "000000"
  enabled_regions = ["eu868"]

[api]
  # Override via CHIRPSTACK__API__SECRET in compose.
  bind = "0.0.0.0:8080"
  secret = "you-can-never-buy-the-internet"

[gateway]
  client_cert_lifetime = "12months"

[integration]
  enabled = ["mqtt"]

[integration.mqtt]
  # Override via CHIRPSTACK__INTEGRATION__MQTT__USERNAME / __PASSWORD in compose.
  event_topic = "application/{{application_id}}/device/{{dev_eui}}/event/{{event}}"
  command_topic = "application/{{application_id}}/device/{{dev_eui}}/command/{{command}}"
  json = true
  server = "tcp://mosquitto:1883"
  username = ""
  password = ""
  qos = 1
  clean_session = true
  client_id = "chirpstack-integration"

[monitoring]
  bind = "0.0.0.0:8081"
