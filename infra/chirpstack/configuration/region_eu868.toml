# ChirpStack v4 — EU868-Region (Europa-Frequenzplan)
# Quelle: https://www.chirpstack.io/docs/chirpstack/configuration/region-eu868.html
# Format: ChirpStack v4.5+ (gateway.backend als Struct, nicht String).

[[regions]]
  name = "eu868"
  description = "EU868"
  common_name = "EU868"
  user_info = "EU868 Frequenzplan, vorbereitet fuer Hotel Sonnblick"

  [regions.network]
    installation_margin = 10.0
    rx_window = 0
    rx1_delay = 1
    rx1_dr_offset = 0
    rx2_dr = 0
    rx2_frequency = 869525000
    gateway_prefer_min_margin = 10.0
    downlink_tx_power = -1
    adr_disabled = false
    min_dr = 0
    max_dr = 5
    uplink_max_eirp = 16.0
    enabled_uplink_channels = []

    [regions.network.class_b]
      ping_slot_dr = 3
      ping_slot_frequency = 868100000

  [regions.gateway]
    [regions.gateway.backend]
      enabled = "mqtt"

      [regions.gateway.backend.mqtt]
        event_topic = "eu868/gateway/+/event/+"
        command_topic = "eu868/gateway/{{ gateway_id }}/command/{{ command }}"
        server = "tcp://mosquitto:1883"
        qos = 1
        clean_session = true
        client_id = "chirpstack-gw-eu868"
