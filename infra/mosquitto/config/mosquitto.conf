# Mosquitto v2 Konfiguration für LoRaWAN-Pipeline (lokale Entwicklung)
# Quelle: https://mosquitto.org/documentation/
#
# Lokal: allow_anonymous true (Bind-Mount-Permission-Issues auf Windows umgehen).
# Listener nur auf Container-Port - Port-Mapping in compose limitiert auf 127.0.0.1,
# d.h. nur die Docker-Services und localhost können connecten. Kein LAN-Risiko.
#
# Produktionskonfiguration (Sprint 6) wird mit passwd + ACL aktiviert,
# weil dort kein Bind-Mount-Problem existiert (Linux-Host).

persistence true
persistence_location /mosquitto/data/
log_dest stdout
log_type error
log_type warning
log_type notice

listener 1883 0.0.0.0
protocol mqtt

allow_anonymous true

max_keepalive 60
max_connections -1
