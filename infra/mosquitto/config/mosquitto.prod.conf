# Mosquitto v2 Konfiguration fuer Produktion (heizung-test, heizung-main).
#
# Unterschiede zu mosquitto.conf (lokale Entwicklung):
#   - allow_anonymous false: Auth zwingend
#   - password_file: bcrypt-Hashes der drei MQTT-User
#   - acl_file: Topic-Permissions pro User
#
# Compose-Aufruf: command: mosquitto -c /mosquitto/config/mosquitto.prod.conf
#
# User-Schema (Sprint 6.6.4):
#   - chirpstack       : ChirpStack-Server + Gateway-Bridge (full publish/subscribe)
#   - gateway-ug65     : UG65 LoRaWAN-Gateway (publish gateway-events)
#   - heizung-api      : FastAPI-Subscriber (read application-events, write downlinks)
#
# passwd-Datei wird NICHT ins Repo committet (siehe .gitignore).
# Erzeugung pro Server: siehe RUNBOOK.

persistence true
persistence_location /mosquitto/data/
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information

listener 1883 0.0.0.0
protocol mqtt

allow_anonymous false
password_file /mosquitto/config/passwd
acl_file /mosquitto/config/acl

max_keepalive 60
max_connections -1
