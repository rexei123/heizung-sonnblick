# Produktions-Compose
# Wird in /opt/heizung-sonnblick deployt und vom deploy.sh-Skript gestartet.
#
# Stage wird über die Env-Variable ${STAGE} gesteuert (test|main).
# Das passende Caddyfile wird per Bind-Mount eingehängt.

services:
  db:
    image: timescale/timescaledb:latest-pg16
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    restart: always
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Kein Port-Mapping nach außen — nur Caddy spricht mit der API.
    expose:
      - "8000"

  web:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
    restart: always
    environment:
      NEXT_PUBLIC_API_BASE_URL: https://${PUBLIC_HOSTNAME}
    depends_on:
      - api
    expose:
      - "3000"

  caddy:
    image: caddy:2-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../caddy/Caddyfile.${STAGE}:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
      - caddy_logs:/var/log/caddy
    depends_on:
      - api
      - web

volumes:
  db_data:
  caddy_data:
  caddy_config:
  caddy_logs:
