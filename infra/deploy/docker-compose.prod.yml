# Produktions-Compose (Pull-basiert)
#
# Zieht fertige Images aus GHCR statt lokal zu bauen.
# Kein docker build auf den Prod-Hosts mehr.
#
# Gesteuert über .env im selben Verzeichnis:
#   STAGE=test|main              -> wählt Caddyfile
#   IMAGE_TAG=develop|main|<sha> -> wählt Image-Version
#   PUBLIC_HOSTNAME=…            -> Caddy + Frontend
#   POSTGRES_*                   -> DB-Credentials
#
# Aktualisierung: deploy-pull.sh (siehe Nachbardatei).

services:
  db:
    image: timescale/timescaledb:latest-pg16
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: ghcr.io/rexei123/heizung-api:${IMAGE_TAG:-develop}
    pull_policy: always
    restart: always
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Kein Port-Mapping nach außen — nur Caddy spricht mit der API.
    expose:
      - "8000"

  web:
    image: ghcr.io/rexei123/heizung-web:${IMAGE_TAG:-develop}
    pull_policy: always
    restart: always
    environment:
      NEXT_PUBLIC_API_BASE_URL: https://${PUBLIC_HOSTNAME}
    depends_on:
      - api
    expose:
      - "3000"

  caddy:
    image: caddy:2-alpine
    restart: always
    environment:
      PUBLIC_HOSTNAME: ${PUBLIC_HOSTNAME}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../caddy/Caddyfile.${STAGE}:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
      - caddy_logs:/var/log/caddy
    depends_on:
      - api
      - web

volumes:
  db_data:
  caddy_data:
  caddy_config:
  caddy_logs:
